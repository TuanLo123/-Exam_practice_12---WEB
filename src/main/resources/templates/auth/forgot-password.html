<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Quên Mật Khẩu</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00b3ff;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0092d0;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            word-wrap: break-word;
        }
        .success {
            background-color: #e6f7ff;
            border: 1px solid #00b3ff;
            color: #0077aa;
        }
        .error {
            background-color: #fff1f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quên Mật Khẩu</h2>
    <form id="forgotPasswordForm">
        <div class="form-group">
            <label for="email">Địa chỉ Email:</label>
            <input type="email" id="email" placeholder="Nhập email của bạn..." required>
        </div>
        <button type="submit" id="submitBtn">Gửi mã OTP</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Chặn load lại trang
        
        const emailInput = document.getElementById('email').value;
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Đang xử lý...';
        resultDiv.style.display = 'none';

        try {
            // 1. Sửa URL: Bỏ "/api/auth" để khớp với @PostMapping("/forgot-password") ở Controller
            const apiUrl = 'http://localhost:8080/forgot-password';
            
            // 2. Đóng gói dữ liệu dạng Form Data để khớp với @ModelAttribute của Spring Boot
            const formData = new URLSearchParams();
            formData.append('email', emailInput); 

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    // Định dạng gửi lên trùng khớp với định dạng Form submit truyền thống
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData // Truyền body chứa email đi
            });

            const data = await response.json(); 

            resultDiv.style.display = 'block';
            if (response.ok) { 
                resultDiv.className = 'success';
                resultDiv.innerText = data.message || 'Thành công!';
            } else { 
                resultDiv.className = 'error';
                resultDiv.innerText = data.error || 'Đã có lỗi xảy ra!';
            }
        } catch (error) { 
            resultDiv.style.display = 'block';
            resultDiv.className = 'error';
            resultDiv.innerText = 'Không thể kết nối đến server Spring Boot! (Kiểm tra lại cổng 8080 hoặc CORS)';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Gửi mã OTP';
        }
    });
</script>

</body>
</html>
